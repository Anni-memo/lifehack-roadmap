// ── ユーティリティ ──
function shuffle(arr){
  var a = arr.slice();
  for(var i = a.length-1; i > 0; i--){
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function getHour(){ return new Date().getHours(); }

function getTimeSlot(){
  var h = getHour();
  if(h >= 5 && h < 9) return 'morning';
  if(h >= 9 && h < 17) return 'daytime';
  if(h >= 17 && h < 22) return 'evening';
  return 'night';
}

function formatDate(){
  var d = new Date();
  var days = ['日','月','火','水','木','金','土'];
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日（' + days[d.getDay()] + '）';
}

// ── 連続訪問日数 ──
function updateStreak(){
  var today = new Date().toISOString().slice(0,10);
  var lastVisit = localStorage.getItem('sh_last_visit');
  var streak = parseInt(localStorage.getItem('sh_streak') || '0');
  if(lastVisit === today){
    // 今日既に訪問済み
  } else {
    var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
    if(lastVisit === yesterday){
      streak++;
    } else {
      streak = 1;
    }
    localStorage.setItem('sh_last_visit', today);
    localStorage.setItem('sh_streak', streak);
  }
  return streak;
}

// ── 読んだ記事の履歴 ──
function getReadHistory(){
  try {
    var data = localStorage.getItem('sh_read_history');
    return data ? JSON.parse(data) : [];
  } catch(e){ return []; }
}

  html += '<div class="quote-card-smart" id="quoteCard">';
  html += '<div class="qcs-text" id="quoteText">' + esc(quote.text) + '</div>';
  html += '<div class="qcs-author" id="quoteAuthor">--- ' + esc(quote.author) + '</div>';
  html += '<div class="qcs-hint">クリックで別の格言を表示</div>';
  html += '</div>';

  // 時間帯別コンテンツ
  if(slot === 'morning'){
    // 朝: モーニングメソッドへの誘導 + おすすめ記事3本
    html += '<a class="link-card" href="../morning-method/">&#9728; モーニングメソッドを始める</a>';
    html += '<div style="margin-bottom:24px"></div>';
    html += '<div class="section-label">MORNING READING --- 朝のおすすめ記事</div>';
    html += renderArticles(shuffle(ARTICLES.morning).slice(0,3));

  } else if(slot === 'daytime'){
    // 昼: 概念の棚からランダム + クイズ
    html += '<div class="section-label">TODAY\'S READING --- 投資原則・概念の棚から</div>';
    html += renderArticles(shuffle(ARTICLES.daytime).slice(0,3));
    html += '<div class="section-label">QUICK QUIZ --- 用語クイズ</div>';
    html += renderQuiz();
    html += '<a class="link-card" href="../learning/">もっとクイズに挑戦する</a>';

  } else if(slot === 'evening'){
    // 夕方-夜: 思考を広げる記事 + ジャーナリング + 目標設定
    html += '<div class="section-label">EVENING READING --- 思考を広げる</div>';
    html += renderArticles(shuffle(ARTICLES.evening).slice(0,3));
    html += '<div class="section-label">JOURNAL --- 今日の振り返り</div>';
    html += renderJournal();
    html += '<div class="section-label">TOMORROW\'S GOAL --- 明日の目標</div>';
    html += renderGoal();

  } else {
    // 深夜: 軽い読み物 + 528Hz案内
    html += '<div class="music-rec">';
    html += '<div class="music-rec-icon">&#127925;</div>';
    html += '<div class="music-rec-text">528Hzアンビエント音楽で心を落ち着けませんか？<br>左下の音符ボタンで再生できます。<small>528Hzは「愛の周波数」とも呼ばれ、リラクゼーション効果があるとされています。</small></div>';
    html += '</div>';
    html += '<div class="section-label">NIGHT READING --- 哲学の時間</div>';
    html += renderArticles(shuffle(ARTICLES.night).slice(0,3));
  }

  // 今日読んだ記事（全時間帯共通）
  html += '<div class="section-label">READ TODAY --- 今日読んだ記事</div>';
  html += renderReadHistory();

  content.innerHTML = html;

  // イベント設定
  setupQuoteClick();
  if(slot === 'daytime') setupQuiz();
  if(slot === 'evening'){ setupJournal(); setupGoal(); }
}

function esc(s){
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderArticles(list){
  var html = '<div class="article-cards">';
  list.forEach(function(a){
    html += '<a class="ac" href="' + a.url + '">';
    html += '<div class="ac-cat">' + a.cat + '</div>';
    html += '<div class="ac-title">' + a.title + '</div>';
    html += '<div class="ac-desc">' + a.desc + '</div>';
    html += '</a>';
  });
  html += '</div>';
  return html;
}

function renderQuiz(){
  var q = QUIZ_DATA[Math.floor(Math.random()*QUIZ_DATA.length)];
  var html = '<div class="quiz-card" id="quizCard" data-ans="' + q.ans + '">';
  html += '<div class="quiz-q">' + esc(q.q) + '</div>';
  html += '<div class="quiz-options">';
  q.opts.forEach(function(opt, i){
    html += '<button class="quiz-opt" data-idx="' + i + '">' + esc(opt) + '</button>';
  });
  html += '</div>';
  html += '<div class="quiz-result" id="quizResult"></div>';
  html += '</div>';
  return html;
}

function renderJournal(){
  var today = new Date().toISOString().slice(0,10);
  var saved = localStorage.getItem('sh_journal_' + today) || '';
  var html = '<div class="journal">';
  html += '<textarea id="journalText" placeholder="今日学んだこと、感じたこと、投資で気づいたことを書いてみましょう...">' + esc(saved) + '</textarea>';
  html += '<div class="journal-actions"><button class="journal-btn" id="journalSave">保存する</button></div>';
  html += '<div class="journal-saved" id="journalSaved">保存しました</div>';
  html += '</div>';
  return html;
}

function renderGoal(){
  var tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0,10);
  var saved = localStorage.getItem('sh_goal_' + tomorrow) || '';
  var html = '<input type="text" class="goal-input" id="goalInput" placeholder="明日やりたいこと・読みたい記事・考えたいテーマ..." value="' + esc(saved) + '">';
  html += '<button class="journal-btn" id="goalSave">目標を保存</button>';
  html += '<div class="journal-saved" id="goalSaved">保存しました</div>';
  return html;
}

function renderReadHistory(){
  var history = getReadHistory();
  var today = new Date().toISOString().slice(0,10);
  var todayItems = history.filter(function(h){ return h.date === today; });
  if(todayItems.length === 0){
    return '<div class="history-section"><div class="history-empty">まだ記事を読んでいません。上のおすすめから始めてみましょう。</div></div>';
  }
  var html = '<div class="history-section">';
  todayItems.forEach(function(h){
    html += '<div class="history-item">' + esc(h.title) + ' <span style="color:var(--gold2);font-size:.6rem;">' + h.time + '</span></div>';
  });
  html += '</div>';
  return html;
}

// ── イベント設定 ──
function setupQuoteClick(){
  var card = document.getElementById('quoteCard');
  if(!card) return;
  card.addEventListener('click', function(){
    var q = QUOTES[Math.floor(Math.random()*QUOTES.length)];
    document.getElementById('quoteText').textContent = q.text;
    document.getElementById('quoteAuthor').textContent = '--- ' + q.author;
  });
}

function setupQuiz(){
  var card = document.getElementById('quizCard');
  if(!card) return;
  var ans = parseInt(card.getAttribute('data-ans'));
  var opts = card.querySelectorAll('.quiz-opt');
  var answered = false;
  opts.forEach(function(btn){
    btn.addEventListener('click', function(){
      if(answered) return;
      answered = true;
      var idx = parseInt(btn.getAttribute('data-idx'));
      if(idx === ans){
        btn.classList.add('correct');
        document.getElementById('quizResult').textContent = '正解です！';
      } else {
        btn.classList.add('wrong');
        opts[ans].classList.add('correct');
        document.getElementById('quizResult').textContent = '残念...正解は「' + opts[ans].textContent + '」でした。';
      }
    });
  });
}

function setupJournal(){
  var saveBtn = document.getElementById('journalSave');
  if(!saveBtn) return;
  saveBtn.addEventListener('click', function(){
    var today = new Date().toISOString().slice(0,10);
    var text = document.getElementById('journalText').value;
    localStorage.setItem('sh_journal_' + today, text);
    var msg = document.getElementById('journalSaved');
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display = 'none'; }, 2000);
  });
}

function setupGoal(){
  var saveBtn = document.getElementById('goalSave');
  if(!saveBtn) return;
  saveBtn.addEventListener('click', function(){
    var tomorrow = new Date(Date.now() + 86400000).toISOString().slice(0,10);
    var text = document.getElementById('goalInput').value;
    localStorage.setItem('sh_goal_' + tomorrow, text);
    var msg = document.getElementById('goalSaved');
    msg.style.display = 'block';
    setTimeout(function(){ msg.style.display = 'none'; }, 2000);
  });
}

// ── 初期化 ──
render();

})();
</script>
</body>
</html>
