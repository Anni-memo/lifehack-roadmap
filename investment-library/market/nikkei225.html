<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>日経225データ棚｜投資と思考の書斎</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Noto+Serif+JP:wght@300;400;500;600;700&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:    #1a1208;
  --ink2:   #2d2010;
  --ink3:   #4a3520;
  --parch:  #f5ede0;
  --parch2: #efe4d0;
  --parch3: #e8d8be;
  --parch4: #dfc9a8;
  --gold:   #8b6914;
  --gold2:  #b8900a;
  --gold3:  #d4aa22;
  --gold4:  #f0cc55;
  --rust:   #8b3a1a;
  --serif:  'Cormorant Garamond', 'Noto Serif JP', serif;
  --jp:     'Noto Serif JP', 'Cormorant Garamond', serif;
  --mono:   'DM Mono', monospace;
  --shadow: 0 4px 24px rgba(26,18,8,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--ink);scroll-behavior:smooth}
body{font-family:var(--jp);background:var(--parch);color:var(--ink);min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:1000;opacity:.5;
}

/* ── HEADER ── */
.site-header{
  background:var(--ink2);border-bottom:1px solid var(--gold)33;
  padding:0 20px;
}
.site-header-inner{
  max-width:860px;margin:0 auto;
  display:flex;align-items:center;gap:14px;padding:14px 0;
}
.back-link{
  font-family:var(--mono);font-size:.58rem;color:var(--gold3);
  text-decoration:none;letter-spacing:.08em;opacity:.7;
  transition:opacity .15s;
}
.back-link:hover{opacity:1}
.header-sep{color:var(--gold)44;font-size:.7rem}
.header-crumb{font-family:var(--mono);font-size:.58rem;color:var(--parch4);letter-spacing:.06em}

/* ── HERO ── */
.hero{
  background:linear-gradient(160deg,var(--ink) 0%,var(--ink2) 40%,#3a2510 100%);
  color:var(--parch);padding:48px 24px 40px;
  border-bottom:3px solid var(--gold);position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(184,144,10,.10) 0%,transparent 70%);
}
.hero-ornament{
  font-family:var(--mono);font-size:.56rem;color:var(--gold3);
  letter-spacing:.25em;margin-bottom:16px;opacity:.7;
}
.hero-title{
  font-family:var(--serif);font-size:clamp(1.8rem,5vw,2.8rem);
  font-weight:700;line-height:1.15;color:var(--parch);
  margin-bottom:6px;
}
.hero-title em{
  font-style:italic;color:var(--gold4);
  display:block;font-size:.65em;letter-spacing:.04em;margin-top:4px;
}
.hero-updated{
  font-family:var(--mono);font-size:.56rem;color:var(--gold3);
  letter-spacing:.08em;margin-top:16px;opacity:.6;
}

/* ── PREFACE ── */
.preface{
  background:var(--ink);border-bottom:1px solid var(--gold)22;
  padding:28px 24px;
}
.preface-inner{max-width:860px;margin:0 auto}
.preface-text{
  font-family:var(--serif);font-size:clamp(.85rem,2vw,1.0rem);
  color:var(--parch4);line-height:2.1;font-weight:300;
  letter-spacing:.03em;font-style:italic;
}

/* ── CONTROLS ── */
.controls{
  background:var(--parch2);border-bottom:1px solid var(--parch4);
  padding:16px 20px;
}
.controls-inner{
  max-width:860px;margin:0 auto;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.ctrl-label{font-family:var(--mono);font-size:.54rem;color:var(--ink3);letter-spacing:.1em;flex-shrink:0}
.ctrl-select{
  font-family:var(--jp);font-size:.75rem;color:var(--ink);
  background:var(--parch);border:1px solid var(--parch4);
  padding:6px 10px;border-radius:2px;outline:none;cursor:pointer;
  transition:border-color .15s;
}
.ctrl-select:focus{border-color:var(--gold2)}
.ctrl-search{
  font-family:var(--jp);font-size:.75rem;color:var(--ink);
  background:var(--parch);border:1px solid var(--parch4);
  padding:6px 10px;border-radius:2px;outline:none;
  width:160px;transition:border-color .15s;
}
.ctrl-search:focus{border-color:var(--gold2)}
.ctrl-count{
  margin-left:auto;font-family:var(--mono);font-size:.56rem;
  color:var(--ink3);letter-spacing:.06em;
}

/* ── TABLE WRAPPER ── */
.table-wrap{max-width:860px;margin:0 auto;padding:32px 20px 48px}
.data-note{
  font-family:var(--mono);font-size:.54rem;color:var(--ink3);
  letter-spacing:.06em;margin-bottom:20px;line-height:1.8;
}

table{width:100%;border-collapse:collapse;font-size:.78rem}
thead th{
  font-family:var(--mono);font-size:.54rem;letter-spacing:.1em;
  color:var(--ink3);font-weight:400;
  padding:8px 10px;border-bottom:2px solid var(--parch4);
  text-align:left;white-space:nowrap;
}
thead th.num{text-align:right}
tbody tr{border-bottom:1px solid var(--parch3);transition:background .1s}
tbody tr:hover{background:var(--parch2)}
td{padding:11px 10px;vertical-align:middle;line-height:1.4}
td.code{
  font-family:var(--mono);font-size:.62rem;
  color:var(--gold2);letter-spacing:.06em;width:54px;
}
td.name{font-weight:500;color:var(--ink)}
td.sector{font-size:.68rem;color:var(--ink3);max-width:120px}
td.num{
  font-family:var(--mono);font-size:.72rem;
  text-align:right;color:var(--ink2);
}
td.na{color:var(--parch4);font-family:var(--mono);font-size:.6rem;text-align:right}
td.updated{font-family:var(--mono);font-size:.58rem;color:var(--ink3);white-space:nowrap}

/* ── LOADING / EMPTY ── */
.state-msg{
  text-align:center;padding:48px 20px;
  font-family:var(--serif);font-size:.9rem;
  color:var(--ink3);font-style:italic;
}

/* ── FOOTER ── */
.footer{
  background:var(--ink);color:var(--parch4);
  padding:28px 24px;text-align:center;
  font-size:.68rem;line-height:1.9;
  border-top:2px solid var(--gold)44;
}
.footer-title{font-family:var(--serif);font-size:1.0rem;color:var(--gold3);margin-bottom:8px;letter-spacing:.06em}
.footer a{color:var(--gold3);text-decoration:none}
</style>
</head>
<body>

<!-- ── ヘッダー ── -->
<div class="site-header">
  <div class="site-header-inner">
    <a class="back-link" href="../">← 書斎に戻る</a>
    <span class="header-sep">/</span>
    <span class="header-crumb">日経225データ棚</span>
  </div>
</div>

<!-- ── ヒーロー ── -->
<div class="hero">
  <div class="hero-ornament">MARKET DATA SHELF · NIKKEI 225</div>
  <h1 class="hero-title">
    日経225データ棚
    <em>A quiet shelf for observing the market's outline</em>
  </h1>
  <div class="hero-updated" id="heroUpdated">データを読み込み中...</div>
</div>

<!-- ── 序文 ── -->
<div class="preface">
  <div class="preface-inner">
    <p class="preface-text">
      このページは、売買を急かすためにあるのではない。<br>
      市場の輪郭を静かに観察し、企業を数字の手前で知るためのデータ棚である。<br>
      数字は問いの入口であり、答えではない。
    </p>
  </div>
</div>

<!-- ── コントロール ── -->
<div class="controls">
  <div class="controls-inner">
    <span class="ctrl-label">業種</span>
    <select class="ctrl-select" id="sectorFilter" onchange="applyFilters()">
      <option value="">すべて</option>
    </select>
    <input class="ctrl-search" type="text" id="nameSearch" placeholder="銘柄名で探す" oninput="applyFilters()"/>
    <span class="ctrl-count" id="countLabel"></span>
  </div>
</div>

<!-- ── テーブル ── -->
<div class="table-wrap">
  <div class="data-note" id="dataNoteArea"></div>
  <div id="tableArea"><div class="state-msg">データを読み込んでいます...</div></div>
</div>

<!-- ── フッター ── -->
<footer class="footer">
  <div class="footer-title">投資と思考の書斎</div>
  データは J-Quants より取得。<br>
  投資判断の根拠として使用しないでください。<br>
  <a href="../">← ライブラリトップへ</a>
</footer>

<script>
const DATA_URL = '../data/nikkei225.json';
let allStocks = [];

async function init() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    allStocks = json.stocks || [];

    // 更新日表示
    document.getElementById('heroUpdated').textContent =
      `最終更新: ${json.updated_at || '—'}　／　対象日: ${json.data_date || '—'}`;

    // 注記
    const errors = (json.errors || []).length;
    const noteEl = document.getElementById('dataNoteArea');
    if (errors > 0) {
      noteEl.textContent = `※ ${errors} 銘柄はデータ取得不可のため一部項目が空欄です。`;
    }

    // 業種フィルター構築
    const sectors = [...new Set(allStocks.map(s => s.sector).filter(Boolean))].sort();
    const sel = document.getElementById('sectorFilter');
    sectors.forEach(sec => {
      const opt = document.createElement('option');
      opt.value = sec;
      opt.textContent = sec;
      sel.appendChild(opt);
    });

    applyFilters();
  } catch(e) {
    document.getElementById('tableArea').innerHTML =
      `<div class="state-msg">データの読み込みに失敗しました。<br><small>${e.message}</small></div>`;
  }
}

function fmt(val, digits = 1) {
  if (val === null || val === undefined || val === '') return null;
  const n = parseFloat(val);
  if (isNaN(n)) return null;
  return n.toFixed(digits);
}

function fmtPrice(val) {
  if (val === null || val === undefined) return null;
  const n = parseFloat(val);
  if (isNaN(n)) return null;
  return n.toLocaleString('ja-JP', {maximumFractionDigits: 1});
}

function cell(val, suffix = '') {
  if (val === null) return `<td class="na">—</td>`;
  return `<td class="num">${val}${suffix}</td>`;
}

function applyFilters() {
  const sector = document.getElementById('sectorFilter').value;
  const query  = document.getElementById('nameSearch').value.trim();

  const filtered = allStocks.filter(s => {
    if (sector && s.sector !== sector) return false;
    if (query && !s.name.includes(query) && !s.code.includes(query)) return false;
    return true;
  });

  document.getElementById('countLabel').textContent = `${filtered.length} 社`;
  renderTable(filtered);
}

function renderTable(stocks) {
  if (stocks.length === 0) {
    document.getElementById('tableArea').innerHTML =
      '<div class="state-msg">該当する銘柄がありません。</div>';
    return;
  }

  const rows = stocks.map(s => {
    const price = fmtPrice(s.close);
    const per   = fmt(s.per, 1);
    const pbr   = fmt(s.pbr, 2);
    return `
      <tr>
        <td class="code">${s.code}</td>
        <td class="name">${s.name || '—'}</td>
        <td class="sector">${s.sector || '—'}</td>
        ${price !== null ? `<td class="num">${price}</td>` : `<td class="na">—</td>`}
        ${cell(per, '')}
        ${cell(pbr, '')}
      </tr>`;
  }).join('');

  document.getElementById('tableArea').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>コード</th>
          <th>銘柄名</th>
          <th>業種</th>
          <th class="num">株価</th>
          <th class="num">PER</th>
          <th class="num">PBR</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

init();
</script>
</body>
</html>
